    type: string
    required: true
  - name: source_system
    type: string
    required: true
  - name: source_id
    type: string
    required: false
  - name: name
    type: string
    required: false
  - name: email
    type: string
    required: false
  - name: phone
    type: string
    required: false
  - name: face_hash
    type: string
    required: false
  - name: tags
    type: list
    required: false
  - name: loyalty_tier
    type: string
    required: false
  - name: loyalty_points
    type: int
    required: false
  - name: created_at
    type: string
    required: false
  - name: last_seen_at
    type: string
    required: false
